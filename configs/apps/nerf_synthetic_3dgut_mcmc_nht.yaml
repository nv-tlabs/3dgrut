# @package _global_
# NHT (Neural Harmonic Textures) variant for nerf_synthetic with 3DGUT and MCMC

defaults:
  - /base_mcmc
  - /dataset: nerf
  - /initialization: random
  - /render: 3dgut
  - _self_

model:
  feature_type: "nht"

render:
  particle_feature_half: false
  feature_output_half: false
  particle_kernel_max_alpha: 0.99
  splat:
    ut_alpha: 0.1
    tile_based_culling: false

loss:
  use_opacity: true
  lambda_opacity: 0.02
  use_scale: true
  lambda_scale: 0.005
