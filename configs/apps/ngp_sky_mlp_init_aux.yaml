# @package _global_

# order in which configs override each other (/* - denotes a relative search path)
defaults:
  - /base.yaml
  - /dataset: ngp
  - /initialization: auxiliary
  - /model/background: sky_mlp
  - _self_

# overwrite of default parameters
num_workers: 16

dataset:
  use_aux_data: true

checkpoint:
  frequency: 1000