# @package _global_
# NHT (Neural Harmonic Textures) variant for colmap datasets with 3DGRT and MCMC

defaults:
  - /base_mcmc
  - /dataset: colmap
  - /initialization: colmap
  - /render: 3dgrt
  - _self_

model:
  feature_type: "nht"

render:
  pipeline_type: referenceSlang
  backward_pipeline_type: referenceSlangBwd
  particle_kernel_max_alpha: 0.999

loss:
  use_opacity: true
  lambda_opacity: 0.02
  use_scale: true
  lambda_scale: 0.005
