# @package _global_
# NHT (Neural Harmonic Textures) variant for colmap datasets with 3DGUT and MCMC

defaults:
  - /base_mcmc
  - /dataset: colmap
  - /initialization: colmap
  - /render: 3dgut
  - _self_

model:
  feature_type: "nht"

val_frequency: 999999 # never validate during reference-style training

render:
  particle_feature_half: false
  feature_output_half: false
  particle_kernel_max_alpha: 0.999

initialization:
  use_observation_points: false

loss:
  use_opacity: true
  lambda_opacity: 0.02
  use_scale: true
  lambda_scale: 0.005
