# @package _global_

# order in which configs override each other (/* - denotes a relative search path)
defaults:
  - /base_mcmc
  - /dataset: ncore
  - /initialization: lidar
  - /render: 3dgut
  - _self_

# overwrite of default parameters
num_workers: 16

strategy:
  perturb:
    noise_lr: 5000.0
  add:
    max_n_gaussians: 3333333

loss:
  use_opacity: true
  lambda_opacity: 0.003 # reduced from 0.01 (number of gaussians x3)

val_frequency: 999999 # never validate


