# @package _global_

# 3dgrut equivalent of the NRE robotics 3DGUT static PPISP/MCMC setup.
# NRE-only modules intentionally not represented here: calibration, LiDAR losses,
# semantic distance loss, dynamic layers, mesh, DiFiX, artifact, and NRend toggles.

defaults:
  - /base_mcmc
  - /dataset: colmap
  - /initialization: colmap
  - /render: 3dgut
  - _self_

# COLMAP dataset root must be provided at runtime.
path: ???

# Match the NRE train sampling budget.
dataset:
  downsample_factor: 1
  test_split_interval: 8
  load_exif: true

# Initialize from the COLMAP sparse reconstruction without observer-point scaling.
initialization:
  use_observation_points: false

model:
  background:
    color: white

post_processing:
  method: ppisp

# 3dgrut does not currently expose NRE's log-L1 metric-depth supervision or
# semantic distance weights. Keep the standard photometric objective and disable
# optional opacity/scale regularizers for this robotics baseline.
loss:
  use_opacity: false
  lambda_opacity: 0.0
  use_scale: false
  lambda_scale: 0.0

strategy:
  add:
    max_n_gaussians: 2300000

checkpoint:
  iterations: ${int_list:[ 30000 ]}

# Keep validation disabled, matching the existing robotics app configs.
val_frequency: 999999
