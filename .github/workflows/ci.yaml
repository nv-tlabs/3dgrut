name: Continuous Integration

env:
  DEBIAN_FRONTEND: noninteractive

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}:${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install formatter dependencies
        run: pip install black==26.3.1 isort==5.13.0

      - name: Check code style
        run: bash scripts/formatter.sh --check

  ci-uv:
    name: ci-uv (CUDA ${{ matrix.cuda_version }} Ubuntu ${{ matrix.ubuntu_version }})
    runs-on: ubuntu-${{ matrix.ubuntu_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_version: "11.8.0"
            ubuntu_version: "22.04"
          - cuda_version: "12.8.1"
            ubuntu_version: "24.04"
          - cuda_version: "13.0.2"
            ubuntu_version: "24.04"
          - cuda_version: "13.0.2"
            ubuntu_version: "24.04-arm"
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # when set to "true" but frees about 6 GB
          tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.34
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda_version }}
          method: network

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.11"
          enable-cache: "true"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install 3DGRUT including all dependencies
        run: |
          git config --global --add safe.directory "$(pwd)"
          ./install_env_uv.sh
        env:
          TORCH_CUDA_ARCH_LIST: "9.0" # random arch for testing install
          CUDA_VERSION: ${{ matrix.cuda_version }}

      - name: Smoketest - python train.py --help # better (smoke) testing requires a GPU
        run: |
          .venv/bin/python train.py --help

      - name: Test USD export/import
        run: |
          set +e
          .venv/bin/python -m pytest \
            threedgrut/export/tests/test_export_import.py \
            threedgrut/export/tests/test_ppisp_cuda_export.py \
            threedgrut/export/tests/test_transcode_roundtrip.py \
            -v
          rc=$?
          # These tests require usd-core (pxr), which is only installed on x86_64.
          # On arm64 they self-skip, so pytest exits 5 (no tests collected) -- tolerate
          # that on arm64 only. On x86_64 exit 5 still fails the job, so a silently
          # broken pxr (everything skipped) does not pass unnoticed. Real test
          # failures (exit 1) fail everywhere.
          if [ "$rc" -eq 5 ] && [ "$RUNNER_ARCH" = "ARM64" ]; then
            echo "All USD export tests skipped on $RUNNER_ARCH (pxr unavailable); treating as pass."
            exit 0
          fi
          exit $rc

  ci-uv-windows:
    name: ci-uv-windows (CUDA ${{ matrix.cuda_version }})
    # Pinned to windows-2022 (VS 2022 / MSVC 14.4x). windows-latest moved to the
    # VS 2026 / MSVC 14.51 toolset, whose headers crash CUDA 12.8's cudafe++
    # ('cudafe++' died with status 0xC0000005). CUDA 12.8 officially supports VS 2022.
    runs-on: windows-2022
 
    strategy:
      fail-fast: false
      matrix:
        cuda_version:
          - "12.8.1"
    env:
      CUDA_VERSION: ${{ matrix.cuda_version }}

    steps:
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64  # Options: x86, x64, arm64

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.34
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda_version }}
          method: network

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.11"
          enable-cache: "true"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
 
      - name: Install 3DGRUT including all dependencies
        shell: pwsh
        run: |
          .\install_env_uv.ps1
